name: BuildHID
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # Windows自带MSBuild，不用装dotnet，改用msbuild编译
      - name: Build with MSBuild
        run: |
          msbuild SimplerHidWrite.sln /p:Configuration=Release
          dotnet publish SimplerHidWrite.csproj -c Release --self-contained true -p:PublishSingleFile=true
      - name: ExportEXE
        uses: actions/upload-artifact@v4
        with:
          path: '**/publish/SimplerHidWrite.exe'
