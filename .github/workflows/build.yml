name: BuildHID
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # 直接调用系统自带msbuild，win-latest预装VS编译环境
      - name: Build Release
        run: |
          msbuild SimplerHidWrite.sln /p:Configuration=Release
      - name: Upload Exe
        uses: actions/upload-artifact@v4
        with:
          path: bin/Release/SimplerHidWrite.exe
