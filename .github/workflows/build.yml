name: BuildHID
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: 编译项目
        run: '"C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" SimplerHidWrite.sln /p:Configuration=Release'
      - name: 打包导出
        uses: actions/upload-artifact@v4
        with:
          path: bin/Release/SimplerHidWrite.exe
