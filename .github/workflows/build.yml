name: Build Hidapi EXE

on:
  push:
    branches: [ main, master ] # 兼容 main 或 master 分支

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true # 必须开启子模块

    - name: Setup MSVC Environment
      uses: ilammy/msvc-dev-cmd@v1

    - name: Create main.c (Entry Point)
      run: |
        echo '#include <stdio.h>' > main.c
        echo '#include "hidapi.h"' >> main.c
        echo 'int main() {' >> main.c
        echo '    if (hid_init() != 0) { printf("Init failed\n"); return -1; }' >> main.c
        echo '    struct hid_device_info *devs = hid_enumerate(0x0, 0x0);' >> main.c
        echo '    struct hid_device_info *cur = devs;' >> main.c
        echo '    while (cur) {' >> main.c
        echo '        printf("Found Device: VID=0x%04X PID=0x%04X\n", cur->vendor_id, cur->product_id);' >> main.c
        echo '
