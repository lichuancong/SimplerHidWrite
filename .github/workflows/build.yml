name: BuildHID
on: push
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # 加载VS编译工具（自带MSBuild+Net4.8运行库）
      - name: Setup MSBuild
        uses: ilammy/msvc-dev-cmd@v1
      # 和作者VS编译一模一样的命令
      - name: Build Solution
        run: msbuild "SimplerHidWrite.sln" /p:Configuration=Release /p:Platform="Any CPU"
      # 上传编译好的exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          path: '**/bin/Release/SimplerHidWrite.exe'
